name: Session Reminders

on:
  schedule:
    # Pre-session window: 8:45am ET forward through 9:15am, across EDT/EST
    - cron: '*/15 12-13 * * *'
    # Post-session window: 8:00pm ET forward through 8:30pm, across EDT/EST
    - cron: '*/15 0-1 * * *'
  workflow_dispatch: {}

jobs:
  check-and-remind:
    runs-on: ubuntu-latest
    steps:
      - name: Determine Eastern time and target window
        id: time
        run: |
          hour_et=$(TZ="America/New_York" date +%H)
          min_et=$(TZ="America/New_York" date +%M)
          today_et=$(TZ="America/New_York" date +%F)
          dow_et=$(TZ="America/New_York" date +%u) # 1=Mon ... 7=Sun

          total_min=$((10#$hour_et * 60 + 10#$min_et))
          # ===== TEST MODE: wide open all day =====
          pre_start=$((0))
          pre_end=$((23*60+59))
          post_start=$((20*60))
          post_end=$((20*60+30))
          # ===== END TEST MODE =====

          mode=""
          if [ "$total_min" -ge "$pre_start" ] && [ "$total_min" -le "$pre_end" ]; then
            mode="pre"
          elif [ "$total_min" -ge "$post_start" ] && [ "$total_min" -le "$post_end" ]; then
            mode="post"
          fi

          echo "mode=$mode" >> "$GITHUB_OUTPUT"
          echo "today_et=$today_et" >> "$GITHUB_OUTPUT"
          echo "dow_et=$dow_et" >> "$GITHUB_OUTPUT"

      - name: Check calendar, vacation flag, entry, and reminder log
        if: steps.time.outputs.mode != ''
        id: check
        env:
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          APP_USER_ID: ${{ secrets.APP_USER_ID }}
        run: |
          TODAY="${{ steps.time.outputs.today_et }}"
          MODE="${{ steps.time.outputs.mode }}"

          already_sent=$(curl -s -G "$SUPABASE_URL/rest/v1/reminder_log" \
            -H "apikey: $SERVICE_ROLE_KEY" -H "Authorization: Bearer $SERVICE_ROLE_KEY" \
            --data-urlencode "entry_date=eq.$TODAY" --data-urlencode "reminder_type=eq.$MODE" \
            --data-urlencode "select=id")
          if [ "$(echo "$already_sent" | jq 'length')" -gt 0 ]; then
            echo "should_send=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          holiday_check=$(curl -s -G "$SUPABASE_URL/rest/v1/market_calendar_days" \
            -H "apikey: $SERVICE_ROLE_KEY" -H "Authorization: Bearer $SERVICE_ROLE_KEY" \
            --data-urlencode "date=eq.$TODAY" --data-urlencode "is_open=eq.false" \
            --data-urlencode "select=date")
          is_holiday="false"
          [ "$(echo "$holiday_check" | jq 'length')" -gt 0 ] && is_holiday="true"
          # ===== TEST MODE: ignore actual holiday/weekend status =====
          is_holiday="false"
          # ===== END TEST MODE =====

          day_row=$(curl -s -G "$SUPABASE_URL/rest/v1/trading_days" \
            -H "apikey: $SERVICE_ROLE_KEY" -H "Authorization: Bearer $SERVICE_ROLE_KEY" \
            --data-urlencode "user_id=eq.$APP_USER_ID" --data-urlencode "entry_date=eq.$TODAY" \
            --data-urlencode "select=on_vacation,pre_mental_state,plan_followed")

          on_vacation=$(echo "$day_row" | jq -r '.[0].on_vacation // false')
          pre_mental_state=$(echo "$day_row" | jq -r '.[0].pre_mental_state // ""')
          plan_followed=$(echo "$day_row" | jq -r '.[0].plan_followed')

          should_send="false"
          if [ "$is_holiday" = "false" ] && [ "$on_vacation" != "true" ]; then
            if [ "$MODE" = "pre" ] && [ -z "$pre_mental_state" ]; then
              should_send="true"
            fi
            if [ "$MODE" = "post" ] && [ "$plan_followed" = "null" ]; then
              should_send="true"
            fi
          fi
          echo "DEBUG: already_sent_count=$(echo "$already_sent" | jq 'length')"
          echo "DEBUG: is_holiday=$is_holiday"
          echo "DEBUG: on_vacation=$on_vacation"
          echo "DEBUG: pre_mental_state='$pre_mental_state'"
          echo "DEBUG: plan_followed=$plan_followed"
          echo "should_send=$should_send" >> "$GITHUB_OUTPUT"

      - name: Send Pushover reminder
        if: steps.check.outputs.should_send == 'true'
        env:
          PUSHOVER_TOKEN: ${{ secrets.PUSHOVER_API_TOKEN }}
          PUSHOVER_USER: ${{ secrets.PUSHOVER_USER_KEY }}
        run: |
          if [ "${{ steps.time.outputs.mode }}" = "pre" ]; then
            MSG="Pre-Session Plan not filled out yet — market opens today."
            TITLE="Trade Journal: Pre-Session"
          else
            MSG="Post-Session Review not filled out yet."
            TITLE="Trade Journal: Post-Session"
          fi
          curl -s --form-string "token=$PUSHOVER_TOKEN" --form-string "user=$PUSHOVER_USER" \
            --form-string "title=$TITLE" --form-string "message=$MSG" \
            https://api.pushover.net/1/messages.json

      - name: Log that reminder was sent
        if: steps.check.outputs.should_send == 'true'
        env:
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          curl -s -X POST "$SUPABASE_URL/rest/v1/reminder_log" \
            -H "apikey: $SERVICE_ROLE_KEY" -H "Authorization: Bearer $SERVICE_ROLE_KEY" \
            -H "Content-Type: application/json" -H "Prefer: resolution=ignore-duplicates" \
            -d "{\"entry_date\": \"${{ steps.time.outputs.today_et }}\", \"reminder_type\": \"${{ steps.time.outputs.mode }}\"}"
