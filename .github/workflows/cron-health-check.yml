name: Cron Health Check

# Independent watchdog for the four session-reminder-* pg_cron jobs.
# Deliberately NOT implemented as another pg_cron job — if pg_cron job
# registrations can silently disappear (as happened once, cause unconfirmed),
# a watchdog living inside pg_cron could disappear right along with them.
# This runs on GitHub's scheduler instead and connects directly to Postgres,
# so it survives whatever caused the original jobs to vanish.
#
# Runs daily at 11:00 UTC (7:00am EDT / 6:00am EST) — before the 8:45am ET
# pre-session reminder window, so if something's missing you have time to
# fix it before that day's reminder would silently fail to fire.

on:
  schedule:
    - cron: '0 11 * * *'
  workflow_dispatch: {} # manual test trigger

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Install Postgres 17 client (PGDG)
        run: |
          sudo sh -c 'echo "deb https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/pgdg.gpg
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17

      - name: Check for the four session-reminder cron jobs
        id: check
        env:
          DATABASE_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          EXPECTED="session-reminder-pre-edt session-reminder-pre-est session-reminder-post-edt session-reminder-post-est"
          MISSING=""
          for job in $EXPECTED; do
            COUNT=$(/usr/lib/postgresql/17/bin/psql "$DATABASE_URL" -t -A -c \
              "select count(*) from cron.job where jobname = '${job}' and active = true;")
            if [ "$COUNT" != "1" ]; then
              MISSING="$MISSING $job"
            fi
          done
          if [ -n "$MISSING" ]; then
            echo "missing=true" >> "$GITHUB_OUTPUT"
            echo "missing_jobs=$MISSING" >> "$GITHUB_OUTPUT"
            echo "One or more cron jobs missing/inactive:$MISSING"
          else
            echo "missing=false" >> "$GITHUB_OUTPUT"
            echo "All four session-reminder cron jobs present and active."
          fi

      - name: Send Pushover alert if any jobs are missing
        if: steps.check.outputs.missing == 'true'
        env:
          PUSHOVER_TOKEN: ${{ secrets.PUSHOVER_API_TOKEN }}
          PUSHOVER_USER: ${{ secrets.PUSHOVER_USER_KEY }}
        run: |
          curl -s --form-string "token=$PUSHOVER_TOKEN" --form-string "user=$PUSHOVER_USER" \
            --form-string "title=Trade Journal: Cron jobs missing!" \
            --form-string "message=Missing/inactive session-reminder cron jobs:${{ steps.check.outputs.missing_jobs }} — reminders will not fire until these are recreated in the Supabase SQL editor." \
            --form-string "priority=1" \
            https://api.pushover.net/1/messages.json
