name: Backup Supabase

# Trigger now comes from Supabase pg_cron (see migration_daily_backup_cron.sql),
# which calls the github-backup Edge Function daily at 07:00 UTC; that function
# dispatches this workflow the same way the in-app "Back Up Now" button does.
# GitHub's own `schedule:` trigger was removed — GitHub documents scheduled runs
# as best-effort and occasionally delayed or skipped, whereas an explicit
# workflow_dispatch call (from either Supabase or the app) always fires reliably.

on:
  workflow_dispatch: {} # on-demand: Supabase's daily pg_cron job, or the in-app Backups panel

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Install Postgres 17 client (PGDG)
        run: |
          sudo sh -c 'echo "deb https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/pgdg.gpg
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17
          # AWS CLI v2 is preinstalled on GitHub-hosted runners — no install needed here.
          aws --version

      - name: Dump database
        env:
          # Use the Session Pooler connection string (IPv4-compatible) from
          # Supabase Dashboard > Settings > Database > Connection string > Session pooler.
          DATABASE_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          mkdir -p backup
          # NOTE: -n public restricts the dump to YOUR app's tables only. Supabase's
          # own schemas (auth, storage, realtime, vault, extensions, pgbouncer, graphql)
          # are managed internally by the platform, owned by Supabase's own system
          # roles (not the role this connection string authenticates as, even via
          # Session pooler), and already exist on every project automatically — they
          # should never be dumped or restored by us. Doing so causes a wall of
          # "must be owner of..." errors on restore, since our role can't touch them.
          # NOTE: do NOT pass --no-privileges — it strips Supabase's role grants
          # on YOUR public-schema tables and causes "permission denied for schema
          # public" on restore.
          /usr/lib/postgresql/17/bin/pg_dump "$DATABASE_URL" -Fc -n public -f backup/database.dump

      - name: Sync Storage objects
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.SUPABASE_S3_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.SUPABASE_S3_SECRET_ACCESS_KEY }}
        run: |
          mkdir -p backup/storage
          aws s3 sync "s3://${{ secrets.SUPABASE_S3_BUCKET }}" backup/storage \
            --endpoint-url "${{ secrets.SUPABASE_S3_ENDPOINT }}"

      - name: Bundle backup
        id: bundle
        run: |
          TAG="backup-$(date -u +%Y%m%d-%H%M%S)"
          tar -czf "${TAG}.tar.gz" -C backup .
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Publish as GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.bundle.outputs.tag }}" \
            "${{ steps.bundle.outputs.tag }}.tar.gz" \
            --repo "$GITHUB_REPOSITORY" \
            --title "${{ steps.bundle.outputs.tag }}" \
            --notes "Automated backup (database + storage)."

      - name: Prune old backups (keep 30 most recent)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release list --repo "$GITHUB_REPOSITORY" --limit 100 \
            | awk '{print $1}' | grep '^backup-' | sort -r | tail -n +31 \
            | xargs -r -I{} gh release delete {} --repo "$GITHUB_REPOSITORY" --yes --cleanup-tag
