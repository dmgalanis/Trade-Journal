name: Backup Database and Screenshots

on:
  schedule:
    # Every Sunday at 06:00 UTC — change the cron expression if you want a
    # different cadence. https://crontab.guru is handy for this.
    - cron: '0 6 * * 0'
  workflow_dispatch: {}
    # ^ lets you trigger a backup manually anytime from the Actions tab,
    # no terminal needed.

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Install postgresql-client 17 (matches Supabase's Postgres version)
        run: |
          sudo sh -c 'echo "deb http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          wget --quiet -O - https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/pgdg.gpg
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17

      - name: Set backup timestamp
        id: ts
        run: echo "stamp=$(date -u +'%Y-%m-%d-%H%M')" >> "$GITHUB_OUTPUT"

      - name: Dump database (public schema — data + schema, restore-ready)
        run: |
          pg_dump "${{ secrets.SUPABASE_DB_URL }}" \
            --schema=public \
            --clean --if-exists --no-owner --no-privileges \
            --file=db_backup.sql

      - name: Sync screenshots bucket
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.SUPABASE_S3_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.SUPABASE_S3_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.SUPABASE_S3_REGION }}
        run: |
          mkdir -p storage_backup/screenshots
          aws s3 sync "s3://screenshots" "storage_backup/screenshots" \
            --endpoint-url "${{ secrets.SUPABASE_S3_ENDPOINT }}"

      - name: Bundle backup
        id: bundle
        run: |
          NAME="backup-${{ steps.ts.outputs.stamp }}"
          mkdir "$NAME"
          mv db_backup.sql "$NAME/"
          mv storage_backup "$NAME/storage"
          tar -czf "$NAME.tar.gz" "$NAME"
          echo "name=$NAME" >> "$GITHUB_OUTPUT"

      - name: Upload backup as a GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.bundle.outputs.name }}" \
            "${{ steps.bundle.outputs.name }}.tar.gz" \
            --title "Backup ${{ steps.ts.outputs.stamp }}" \
            --notes "Automated database + screenshot backup"

      - name: Prune old backups (keep most recent 8)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release list --json tagName -q '.[].tagName' \
            | grep '^backup-' | sort -r | tail -n +9 \
            | while read -r tag; do
                echo "Deleting old backup release: $tag"
                gh release delete "$tag" --yes --cleanup-tag
              done
