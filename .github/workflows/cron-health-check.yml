name: Cron Health Check
# Independent watchdog for critical pg_cron jobs: the four session-reminder-*
# jobs and daily-backup-trigger. Deliberately NOT implemented as another
# pg_cron job — if pg_cron job registrations can silently disappear (as has
# now happened twice, cause unconfirmed both times), a watchdog living inside
# pg_cron could disappear right along with them. This runs on GitHub's
# scheduler instead and connects directly to Postgres, so it survives
# whatever caused the original jobs to vanish.
#
# Runs daily at 11:00 UTC (7:00am EDT / 6:00am EST) — before the 8:45am ET
# pre-session reminder window and well after the 07:00 UTC daily backup
# window, so if something's missing you have time to fix it before that
# day's reminder would silently fail to fire, and you'll know same-day if
# the backup didn't run.
on:
  schedule:
    - cron: '0 11 * * *'
  workflow_dispatch: {} # manual test trigger
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Install Postgres 17 client (PGDG)
        run: |
          sudo sh -c 'echo "deb https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/pgdg.gpg
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17
      - name: Check for required cron jobs
        id: check
        env:
          DATABASE_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          EXPECTED="session-reminder-pre-edt session-reminder-pre-est session-reminder-post-edt session-reminder-post-est daily-backup-trigger"
          MISSING=""
          for job in $EXPECTED; do
            COUNT=$(/usr/lib/postgresql/17/bin/psql "$DATABASE_URL" -t -A -c \
              "select count(*) from cron.job where jobname = '${job}' and active = true;")
            if [ "$COUNT" != "1" ]; then
              MISSING="$MISSING $job"
            fi
          done
          if [ -n "$MISSING" ]; then
            echo "missing=true" >> "$GITHUB_OUTPUT"
            echo "missing_jobs=$MISSING" >> "$GITHUB_OUTPUT"
            echo "One or more cron jobs missing/inactive:$MISSING"
          else
            echo "missing=false" >> "$GITHUB_OUTPUT"
            echo "All required cron jobs present and active."
          fi
      - name: Send Pushover alert if any jobs are missing
        if: steps.check.outputs.missing == 'true'
        env:
          PUSHOVER_TOKEN: ${{ secrets.PUSHOVER_API_TOKEN }}
          PUSHOVER_USER: ${{ secrets.PUSHOVER_USER_KEY }}
        run: |
          curl -s --form-string "token=$PUSHOVER_TOKEN" --form-string "user=$PUSHOVER_USER" \
            --form-string "title=Trade Journal: Cron jobs missing!" \
            --form-string "message=Missing/inactive cron jobs:${{ steps.check.outputs.missing_jobs }} — recreate these in the Supabase SQL editor via cron-recovery.sql. Reminders and/or the daily backup will not fire until fixed." \
            --form-string "priority=1" \
            https://api.pushover.net/1/messages.json
