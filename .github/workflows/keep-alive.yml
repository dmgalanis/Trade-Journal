name: Supabase Keep-Alive

on:
  schedule:
    - cron: '0 13 * * 1,4'  # Mondays & Thursdays, 13:00 UTC — max gap 4 days
  workflow_dispatch: {}     # lets you trigger manually to test

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST API
        run: |
          curl -s -o /dev/null -w "Keep-alive ping status: %{http_code}\n" \
            "${{ secrets.VITE_SUPABASE_URL }}/rest/v1/rules_master?select=id&limit=1" \
            -H "apikey: ${{ secrets.VITE_SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.VITE_SUPABASE_ANON_KEY }}"
